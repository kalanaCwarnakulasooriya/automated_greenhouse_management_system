server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**

        - id: zone-service
          uri: lb://zone-service
          predicates:
            - Path=/api/zones/**

        - id: sensor-service
          uri: lb://sensor-service
          predicates:
            - Path=/api/sensors/**

        - id: automation-service
          uri: lb://automation-service
          predicates:
            - Path=/api/automation/**

        - id: crop-service
          uri: lb://crop-service
          predicates:
            - Path=/api/crops/**
