spring.application.name=configserver
server.port=8888
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Git Backend
spring.cloud.config.server.git.uri=https://github.com/kalanaCwarnakulasooriya/automated_greenhouse_management_system.git
